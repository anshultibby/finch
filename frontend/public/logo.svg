<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <g transform="translate(256,260) scale(1,-1)">
    <!-- body -->
    <ellipse cx="0" cy="0" rx="95" ry="70" fill="white" transform="rotate(-10)"/>
    <!-- head -->
    <circle cx="80" cy="60" r="52" fill="white"/>
    <!-- eye -->
    <circle cx="98" cy="68" r="8" fill="#1E293B"/>
    <circle cx="100" cy="70" r="2.5" fill="white"/>
    <!-- beak -->
    <polygon points="132,58 160,52 132,46" fill="#F59E0B"/>
    <!-- wing -->
    <path d="M-20,10 Q-80,90 -140,60 Q-90,40 -60,10 Q-40,-10 -20,10Z" fill="#DBEAFE"/>
    <!-- tail -->
    <path d="M-80,-30 Q-140,-20 -170,10 Q-150,-10 -140,-40 Q-120,-30 -80,-30Z" fill="#DBEAFE"/>
  </g>
</svg>
